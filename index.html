<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plex Malaysia</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
<h1 class="logo">Plex Malaysia</h1>
<input type="text" id="search" placeholder="Search movie...">
</header>

<section class="row">
<h2>Movies</h2>
<div class="movie-row" id="catalog"></div>
</section>

<div id="popup" class="popup">
<div class="popup-content">
<span id="close">&times;</span>
<img id="popupPoster">
<h2 id="popupTitle"></h2>
<p id="popupInfo"></p>
</div>
</div>

<script src="data.js"></script>
<script src="script.js"></script>

</body>
</html>
