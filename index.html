<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Plex Malaysia</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0b0f1a;
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:20px;
background:linear-gradient(90deg,#000,#0b0f1a);
}

.logo{
font-size:26px;
color:#00bfff;
font-weight:bold;
}

.search{
padding:8px;
border-radius:6px;
border:none;
}

.hero{
height:300px;
background:url("https://images.unsplash.com/photo-1606813907291-d86efa9b94db") center/cover;
display:flex;
align-items:center;
padding-left:40px;
}

.hero h1{
font-size:40px;
text-shadow:0 0 20px black;
}

.container{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,180px);
gap:20px;
}

.card{
cursor:pointer;
transition:transform 0.3s;
}

.card img{
width:180px;
border-radius:10px;
}

.card:hover{
transform:scale(1.1);
}

.admin{
margin-bottom:20px;
}

button{
padding:10px 14px;
border:none;
background:#00bfff;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0088cc;
}

</style>

</head>

<body>

<header>

<div class="logo">Plex Malaysia</div>

<input class="search" id="search" placeholder="Search movie...">

</header>

<section class="hero">

<h1>Streaming Library</h1>

</section>

<div class="container">

<div class="admin">

<input id="title" placeholder="Add movie title">
<button onclick="addMovie()">Add Movie</button>

</div>

<div class="grid" id="movies"></div>

</div>

<script>

const apiKey="b25c52a6"

let movies=[]

async function addMovie(){

let title=document.getElementById("title").value

let res=await fetch(`https://www.omdbapi.com/?apikey=${apiKey}&t=${title}`)

let movie=await res.json()

movies.push(movie)

renderMovies()

}

function renderMovies(){

let container=document.getElementById("movies")

container.innerHTML=""

movies.forEach(m=>{

container.innerHTML+=`
<div class="card">

<img src="${m.Poster}">

<p>${m.Title}</p>

</div>
`

})

}

</script>

</body>
</html>
