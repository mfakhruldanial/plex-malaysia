<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Plex Malaysia Library</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
background:#0a0e27;
color:#e0e0e0;
font-family:Arial;
}

.header{
background:#111633;
padding:20px;
border-bottom:1px solid rgba(255,215,0,0.3);
}

.title{
color:#ffd700;
font-size:32px;
font-weight:700;
}

.search{
background:#1a1f3a;
padding:10px 15px;
border-radius:6px;
border:1px solid rgba(255,215,0,0.3);
width:250px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:20px;
padding:30px;
}

.card{
background:#141a3b;
border-radius:10px;
overflow:hidden;
transition:0.3s;
cursor:pointer;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 30px rgba(0,0,0,0.5);
}

.poster{
width:100%;
height:280px;
object-fit:cover;
}

.card-title{
padding:10px;
font-weight:600;
color:#ffd700;
font-size:14px;
}

.card-info{
padding:0 10px 12px 10px;
font-size:12px;
color:#aaa;
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
justify-content:center;
align-items:center;
}

.modal-box{
background:#1a1f3a;
padding:30px;
border-radius:10px;
max-width:600px;
width:90%;
}

.btn{
background:#ffd700;
color:#000;
padding:10px 20px;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

</style>
</head>


<body>


<div class="header flex justify-between items-center">

<div class="title">Plex Malaysia</div>

<input id="search" class="search" placeholder="Search movie...">

</div>


<div id="library" class="grid"></div>



<div id="detailsModal" class="modal">

<div class="modal-box">

<img id="modalPoster" style="width:200px;border-radius:6px;margin-bottom:20px">

<h2 id="modalTitle" style="color:#ffd700;font-size:24px;margin-bottom:10px"></h2>

<p id="modalInfo" style="margin-bottom:20px"></p>

<a href="https://payment.tngdigital.com.my/sc/bDLnyq5NQB" target="_blank" class="btn">
Pay via TNG
</a>

<br><br>

<button onclick="closeModal()" style="color:#fff">Close</button>

</div>

</div>



<script>

let library = [

{
title:"Game of Thrones",
type:"TV Series",
year:2011,
poster:"https://m.media-amazon.com/images/M/MV5BN2IzYzBiOTQtNGZmMi00NDI5LTgxMzMtN2EzZjA1NjhlOGMxXkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg"
},

{
title:"The Shawshank Redemption",
type:"Movie",
year:1994,
poster:"https://m.media-amazon.com/images/M/MV5BNDE3ODcxYzMtY2YzZC00NmNlLWJiNDMtZDViZWM2MzIxZDYwXkEyXkFqcGdeQXVyNjAwNDUxODI@._V1_.jpg"
},

{
title:"Anaconda (2025)",
type:"Movie",
year:2025,
poster:"https://via.placeholder.com/300x450?text=Anaconda+2025"
},

{
title:"Demon Slayer Infinity Castle",
type:"Anime",
year:2025,
poster:"https://via.placeholder.com/300x450?text=Demon+Slayer"
}

];


const libraryDiv = document.getElementById("library");

function render(list){

libraryDiv.innerHTML="";

list.forEach(movie=>{

let card=document.createElement("div");

card.className="card";

card.innerHTML=`

<img class="poster" src="${movie.poster}">

<div class="card-title">${movie.title}</div>

<div class="card-info">${movie.year} • ${movie.type}</div>

`;

card.onclick=()=>openModal(movie);

libraryDiv.appendChild(card);

});

}

render(library);



document.getElementById("search").addEventListener("input",e=>{

let q=e.target.value.toLowerCase();

let filtered=library.filter(m=>m.title.toLowerCase().includes(q));

render(filtered);

});



function openModal(movie){

document.getElementById("modalPoster").src=movie.poster;

document.getElementById("modalTitle").innerText=movie.title;

document.getElementById("modalInfo").innerText=movie.year+" • "+movie.type;

document.getElementById("detailsModal").style.display="flex";

}



function closeModal(){

document.getElementById("detailsModal").style.display="none";

}


</script>

</body>
</html>
